<!DOCTYPE html>
<html>
    <head>

        <title>Registration Page</title>

    </head>
    <body style="background-color: whitesmoke;">
        <br><br><br>
        <form >
            <center>
            <div style="background-color: violet;border: solid;border-color: black;border-width: 2px;
                        width: 350px;height:500px;align-items: center;">
                
                <h1 style="color:red">Registration Form</Form></h1>
                First name:<input type="text" name="fname"><br><br>
                Last name:<input type="text" name="lname"><br><br>
                email id:<input type="text" name="mailid"><br><br>
                Password:<input type="password" name="password"><br><br>
                Gender:<input type="radio" name="gender">Male 
                <input type="radio" name="gender">Female <br><br>
                Phone Number:
                <input type="number" name="Phone" maxlength="10"><br><br>
                Address:
                <textarea name="Address" rows="3"columns="6"></textarea> <br><br>
                Known Language:
                <input type="checkbox" name="python">Python &nbsp;&nbsp;
                <input type="checkbox" name="c">C &nbsp;&nbsp;
                <input type="checkbox" name="java">Java <br><br>
                <input type="button" value="submit" onclick="window.location.href='./LOGIN.html'">
                <input type="reset" value="reset">

     </div>
     </center>
</form>
     </body>
</html>
